<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Speed Drill | By Mudit Mishra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
        // Force Light Mode Default
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            localStorage.theme = 'light';
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .glass-card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            transition: background 0.3s, border 0.3s;
        }
        html.dark .glass-card {
            background: rgba(30, 41, 59, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        html.dark .ambient-blob { mix-blend-mode: screen; opacity: 0.15; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 flex flex-col min-h-screen font-sans text-gray-800 dark:text-slate-200 relative z-0 transition-colors duration-300">

    <div class="fixed top-0 left-0 w-full p-4 flex justify-between items-center z-50 pointer-events-none">
        <div class="pointer-events-auto bg-white/80 dark:bg-slate-800/80 backdrop-blur rounded-2xl px-4 py-2 font-bold shadow-sm border border-gray-200 dark:border-slate-700 flex items-center gap-2 transition-colors">
            <span class="text-xl">🔥</span> 
            <div class="flex flex-col">
                <span id="navStreak" class="text-sm leading-none">0 Days</span>
                <span class="text-[10px] text-gray-400 dark:text-slate-400 font-semibold uppercase tracking-wider leading-none">Streak</span>
            </div>
        </div>
        <button onclick="toggleTheme()" class="pointer-events-auto bg-white/80 dark:bg-slate-800/80 backdrop-blur p-3 rounded-full shadow-sm border border-gray-200 dark:border-slate-700 hover:scale-105 transition-all text-xl focus:outline-none">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <div class="fixed inset-0 z-[-10] overflow-hidden pointer-events-none">
        <div class="ambient-blob absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-indigo-300 mix-blend-multiply filter blur-[100px] opacity-40 animate-blob transition-opacity"></div>
        <div class="ambient-blob absolute top-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-emerald-300 mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-2000 transition-opacity"></div>
        <div class="ambient-blob absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] rounded-full bg-purple-300 mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-4000 transition-opacity"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-4 md:p-8 z-10 w-full pt-20">
        <div class="relative glass-card shadow-[0_8px_40px_rgb(0,0,0,0.08)] rounded-3xl w-full max-w-3xl flex flex-col my-auto">
            <div id="app" class="p-6 md:p-10 flex flex-col justify-center fade-in w-full"></div>
        </div>
    </main>

    <footer class="py-6 z-10 w-full flex-shrink-0 backdrop-blur-md bg-white/60 dark:bg-slate-900/60 border-t border-white/80 dark:border-slate-800 shadow-[0_-4px_20px_rgb(0,0,0,0.02)] transition-colors">
        <div class="max-w-3xl mx-auto px-4 text-center">
            <p class="text-sm md:text-base font-bold text-gray-800 dark:text-slate-300 tracking-wide">&copy; 2026 Mudit Mishra. All rights reserved.</p>
            <div class="flex justify-center items-center gap-4 mt-3 text-sm font-medium text-gray-600 dark:text-slate-400">
                <a href="mailto:muditmishrawork@gmail.com" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors duration-200">Email</a>
                <span class="text-gray-300 dark:text-slate-600">|</span>
                <a href="https://www.linkedin.com/in/muditkmishra/" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors duration-200">LinkedIn</a>
                <span class="text-gray-300 dark:text-slate-600">|</span>
                <button onclick="toggleDonateModal()" class="text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 dark:hover:text-emerald-300 font-bold transition-colors duration-200 flex items-center gap-1">
                    ☕ Support App

            </div>

    </footer>

    <div id="donateModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleDonateModal()"></div>
        <div class="relative glass-card shadow-2xl rounded-3xl w-full max-w-sm p-6 text-center transform transition-all fade-in">
            <button onclick="toggleDonateModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl font-bold">&times;</button>
            <div class="text-4xl mb-4">☕</div>
            <h3 class="text-2xl font-extrabold text-gray-900 dark:text-slate-100 mb-2">Keep it Ad-Free!</h3>
            <p class="text-sm text-gray-600 dark:text-slate-400 mb-6 font-medium">If this app helps you or your students, consider buying me a coffee to cover server costs.</p>
            
            <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl p-4 mb-4 text-left shadow-sm">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">UPI (India)</div>
                <div class="flex items-center justify-between">
                    <span id="upiId" class="font-mono text-indigo-600 dark:text-indigo-400 font-bold text-sm md:text-base break-all">mudit.mishra@superyes</span>
                    <button onclick="copyUPI()" class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 p-2 rounded-lg text-xs font-bold transition ml-2 flex-shrink-0">Copy</button>
                </div>
            </div>

            <div class="bg-gray-50 dark:bg-slate-800/50 border border-gray-100 dark:border-slate-700/50 rounded-xl p-3 text-center opacity-70 cursor-not-allowed">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">PayPal (International)</div>
                <div class="text-sm font-semibold text-gray-500">Coming Soon</div>
            </div>
            
            <div id="copyToast" class="text-emerald-500 font-bold text-sm mt-4 opacity-0 transition-opacity duration-300">UPI ID Copied!</div>
        </div>

    <script>
        const app = document.getElementById('app');
        document.getElementById('themeIcon').innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';

        let state = {
            mode: 'menu', gameType: null, config: {}, score: { correct: 0, wrong: 0 },
            mistakes: [], currentQ: { text: '', answer: 0 }, timer: 120, timeLimit: 120,
            interval: null, sequenceIndex: 1, isPaused: false, pbData: null
        };

        const Storage = {
            get: (key, def) => JSON.parse(localStorage.getItem(key)) || def,
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
        };

        // --- NEW MODAL FUNCTIONS ---
        function toggleDonateModal() {
            const modal = document.getElementById('donateModal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        // Bulletproof Copy Function for Mobile & Desktop
        function copyUPI() {
            const textToCopy = 'mudit.mishra@superyes';
            
            // Helper to show the toast animation
            const showToast = () => {
                const toast = document.getElementById('copyToast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            };

            // Attempt modern clipboard API first (Requires HTTPS)
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(showToast).catch(() => fallbackCopyTextToClipboard(textToCopy, showToast));
            } else {
                // Fallback for mobile devices or HTTP connections
                fallbackCopyTextToClipboard(textToCopy, showToast);
            }
        }

        function fallbackCopyTextToClipboard(text, successCallback) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            
            // Prevent scrolling to bottom of page in MS Edge and zooming on iOS
            textArea.style.position = "fixed";
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.opacity = "0"; 

            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful && successCallback) {
                    successCallback();
                }
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
                alert("Could not copy automatically. Please select and copy the ID manually.");
            }
            document.body.removeChild(textArea);
        }

        function refreshStreakUI() {
            let stats = Storage.get('math_stats', { streak: 0, lastDate: null });
            document.getElementById('navStreak').innerText = `${stats.streak} Days`;
        }

        function updateDailyStreak() {
            let stats = Storage.get('math_stats', { streak: 0, lastDate: null });
            const todayStr = new Date().toDateString();
            if (stats.lastDate !== todayStr) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (stats.lastDate === yesterday.toDateString()) stats.streak++;
                else stats.streak = 1;
                stats.lastDate = todayStr;
                Storage.set('math_stats', stats);
            }
            refreshStreakUI();
        }

        function getPBKey() {
            if (state.gameType === 'drill') return `pb_drill_${state.timeLimit}`;
            if (state.gameType === 'tables') return `pb_tbl_${state.config.num}_${state.config.mode}`;
            if (state.gameType === 'squares') return `pb_sq_${state.config.type}_${state.config.mode}`;
            return 'pb_general';
        }

        function calculatePB(elapsedTime) {
            let key = getPBKey();
            let currentBest = Storage.get(key, null);
            let isNew = false;
            let displayVal = 0;

            if (state.config.mode === 'order') {
                let time = elapsedTime;
                displayVal = time + 's';
                if (state.score.wrong === 0) { 
                    if (currentBest === null || time < currentBest) { currentBest = time; isNew = true; }
                }
            } else {
                displayVal = state.score.correct;
                if (currentBest === null || state.score.correct > currentBest) { currentBest = state.score.correct; isNew = true; }
            }
            if (isNew) Storage.set(key, currentBest);
            return { best: currentBest, isNew: isNew, isTimeBased: state.config.mode === 'order' };
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
        }

        refreshStreakUI();

        // --- CORE GAME LOGIC ---
        function render() {
            app.classList.remove('fade-in'); void app.offsetWidth; app.classList.add('fade-in');
            if (state.mode === 'menu') renderMenu();
            else if (state.mode.startsWith('config')) renderConfig();
            else if (state.mode === 'active') renderActiveGame();
            else if (state.mode === 'results') renderResults();
        }

        function renderMenu() {
            app.innerHTML = `
                <div class="text-center mb-10">
                    <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400 tracking-tight mb-3 drop-shadow-sm pb-1">Math Practice</h1>
                    <p class="text-gray-500 dark:text-slate-400 font-medium text-lg">Select a mode to begin your drill</p>
                </div>
                <div class="space-y-4">
                    <button onclick="setConfig('drill')" class="group relative w-full flex items-center justify-between bg-white dark:bg-slate-800 hover:bg-rose-50/80 dark:hover:bg-slate-700 border-2 border-rose-100 dark:border-slate-700 hover:border-rose-300 dark:hover:border-slate-500 text-gray-800 dark:text-slate-100 font-bold py-5 px-6 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-md md:text-xl">
                        <span class="flex items-center gap-3"><span class="text-2xl">⚡</span> Arithmetic Game</span>
                        <span class="text-rose-400 dark:text-rose-500 group-hover:translate-x-1 transition-transform">→</span>
                    </button>
                    <button onclick="setConfig('tables')" class="group relative w-full flex items-center justify-between bg-white dark:bg-slate-800 hover:bg-indigo-50/80 dark:hover:bg-slate-700 border-2 border-indigo-100 dark:border-slate-700 hover:border-indigo-300 dark:hover:border-slate-500 text-gray-800 dark:text-slate-100 font-bold py-5 px-6 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-md md:text-xl">
                        <span class="flex items-center gap-3"><span class="text-2xl">✖️</span> Multiplication Tables</span>
                        <span class="text-indigo-400 dark:text-indigo-500 group-hover:translate-x-1 transition-transform">→</span>
                    </button>
                    <button onclick="setConfig('squares')" class="group relative w-full flex items-center justify-between bg-white dark:bg-slate-800 hover:bg-emerald-50/80 dark:hover:bg-slate-700 border-2 border-emerald-100 dark:border-slate-700 hover:border-emerald-300 dark:hover:border-slate-500 text-gray-800 dark:text-slate-100 font-bold py-5 px-6 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-md md:text-xl">
                        <span class="flex items-center gap-3"><span class="text-2xl">🟦</span> Squares & Cubes</span>
                        <span class="text-emerald-400 dark:text-emerald-500 group-hover:translate-x-1 transition-transform">→</span>
                    </button>
                </div>
            `;
        }

        function setConfig(type) { state.gameType = type; state.mode = 'config-' + type; render(); }

        function renderConfig() {
            let html = `<div class="mb-6"><button onclick="goMenu()" class="text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 font-semibold transition flex items-center gap-2"><span>←</span> Back</button></div>`;
            
            if (state.gameType === 'tables') {
                html += `
                    <h2 class="text-2xl md:text-3xl font-extrabold mb-8 text-gray-800 dark:text-slate-100">Tables Setup</h2>
                    <div class="space-y-6 flex-grow">
                        <div>
                            <label class="block mb-2 font-bold text-gray-700 dark:text-slate-300">Which Table?</label>
                            <input type="number" inputmode="numeric" id="tblNum" value="7" class="w-full bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-xl font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block mb-2 font-bold text-gray-700 dark:text-slate-300">Multiplier Range</label>
                            <div class="flex items-center gap-2 md:gap-3 w-full">
                                <input type="number" inputmode="numeric" id="tblMin" value="1" class="flex-1 min-w-0 bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-lg md:text-xl text-center font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none">
                                <span class="text-gray-400 dark:text-slate-500 font-bold">to</span>
                                <input type="number" inputmode="numeric" id="tblMax" value="10" class="flex-1 min-w-0 bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-lg md:text-xl text-center font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block mb-2 font-bold text-gray-700 dark:text-slate-300">Practice Mode</label>
                            <select id="tblMode" class="w-full bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-xl font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none cursor-pointer">
                                <option value="order">In Order</option>
                                <option value="random">Random</option>
                            </select>
                        </div>
                    </div>
                `;
            } else if (state.gameType === 'squares') {
                html += `
                    <h2 class="text-2xl md:text-3xl font-extrabold mb-8 text-gray-800 dark:text-slate-100">Squares & Cubes Setup</h2>
                    <div class="space-y-6 flex-grow">
                        <div>
                            <label class="block mb-2 font-bold text-gray-700 dark:text-slate-300">Type</label>
                            <select id="sqType" class="w-full bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-xl font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none cursor-pointer">
                                <option value="square">Squares (x²)</option>
                                <option value="cube">Cubes (x³)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block mb-2 font-bold text-gray-700 dark:text-slate-300">Number Range</label>
                            <div class="flex items-center gap-2 md:gap-3 w-full">
                                <input type="number" inputmode="numeric" id="sqMin" value="1" class="flex-1 min-w-0 bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-lg md:text-xl text-center font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none">
                                <span class="text-gray-400 dark:text-slate-500 font-bold">to</span>
                                <input type="number" inputmode="numeric" id="sqMax" value="30" class="flex-1 min-w-0 bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-lg md:text-xl text-center font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block mb-2 font-bold text-gray-700 dark:text-slate-300">Practice Mode</label>
                            <select id="sqMode" class="w-full bg-white/60 dark:bg-slate-900/60 border-2 border-gray-200 dark:border-slate-700 p-3 md:p-4 rounded-xl text-xl font-bold text-gray-800 dark:text-slate-100 focus:border-indigo-500 outline-none cursor-pointer">
                                <option value="order">In Order</option>
                                <option value="random">Random</option>
                            </select>
                        </div>
                    </div>
                `;
            } else if (state.gameType === 'drill') {
                html += `
                    <h2 class="text-2xl md:text-3xl font-extrabold mb-2 text-gray-800 dark:text-slate-100">Arithmetic Game</h2>
                    <div class="space-y-4 mb-8 flex-grow">
                        <div class="bg-white/80 dark:bg-slate-800/80 p-4 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm space-y-3">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" id="addCheck" checked class="w-5 h-5 text-indigo-600 rounded">
                                <label class="font-bold text-gray-800 dark:text-slate-200 text-lg">Addition</label>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-gray-50 dark:bg-slate-900/50 p-2 rounded-lg border border-gray-100 dark:border-slate-700">
                                    <div class="flex items-center gap-1">
                                        <input type="number" id="addMin1" value="2" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                        <span class="font-bold">-</span>
                                        <input type="number" id="addMax1" value="100" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                    </div>
                                </div>
                                <div class="bg-gray-50 dark:bg-slate-900/50 p-2 rounded-lg border border-gray-100 dark:border-slate-700">
                                    <div class="flex items-center gap-1">
                                        <input type="number" id="addMin2" value="2" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                        <span class="font-bold">-</span>
                                        <input type="number" id="addMax2" value="100" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-white/80 dark:bg-slate-800/80 p-4 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" id="subCheck" checked class="w-5 h-5 text-indigo-600 rounded">
                                <label class="font-bold text-gray-800 dark:text-slate-200 text-lg">Subtraction</label>
                            </div>
                        </div>

                        <div class="bg-white/80 dark:bg-slate-800/80 p-4 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm space-y-3">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" id="mulCheck" checked class="w-5 h-5 text-indigo-600 rounded">
                                <label class="font-bold text-gray-800 dark:text-slate-200 text-lg">Multiplication</label>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-gray-50 dark:bg-slate-900/50 p-2 rounded-lg border border-gray-100 dark:border-slate-700">
                                    <div class="flex items-center gap-1">
                                        <input type="number" id="mulMin1" value="2" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                        <span class="font-bold">-</span>
                                        <input type="number" id="mulMax1" value="12" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                    </div>
                                </div>
                                <div class="bg-gray-50 dark:bg-slate-900/50 p-2 rounded-lg border border-gray-100 dark:border-slate-700">
                                    <div class="flex items-center gap-1">
                                        <input type="number" id="mulMin2" value="2" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                        <span class="font-bold">-</span>
                                        <input type="number" id="mulMax2" value="100" class="w-full p-2 text-center border border-gray-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-white/80 dark:bg-slate-800/80 p-4 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" id="divCheck" checked class="w-5 h-5 text-indigo-600 rounded">
                                <label class="font-bold text-gray-800 dark:text-slate-200 text-lg">Division</label>
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-white/80 dark:bg-slate-800/80 p-4 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm mt-6">
                            <label class="font-bold text-gray-800 dark:text-slate-200 text-lg">Duration:</label>
                            <select id="drillTimer" class="bg-white dark:bg-slate-900 border-2 border-gray-200 dark:border-slate-700 p-2 rounded-lg font-bold outline-none cursor-pointer">
                                <option value="30">30s</option>
                                <option value="60">60s</option>
                                <option value="120" selected>120s</option>
                            </select>
                        </div>
                    </div>
                `;
            }
            html += `<div class="mt-8"><button onclick="startGame()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 px-6 rounded-xl text-xl shadow-lg transition-all transform hover:-translate-y-1">Start Practice</button></div>`;
            app.innerHTML = html;
        }

        function startGame() {
            if (state.mode.startsWith('config')) {
                if (state.gameType === 'tables') {
                    state.config = { num: parseInt(document.getElementById('tblNum').value), min: parseInt(document.getElementById('tblMin').value), max: parseInt(document.getElementById('tblMax').value), mode: document.getElementById('tblMode').value };
                    state.timeLimit = 120;
                } else if (state.gameType === 'squares') {
                    state.config = { type: document.getElementById('sqType').value, mode: document.getElementById('sqMode').value, min: parseInt(document.getElementById('sqMin').value), max: parseInt(document.getElementById('sqMax').value) };
                    state.timeLimit = 120;
                } else if (state.gameType === 'drill') {
                    state.timeLimit = parseInt(document.getElementById('drillTimer').value);
                    state.config = { ops: [], mode: 'random', add: { aMin: parseInt(document.getElementById('addMin1').value), aMax: parseInt(document.getElementById('addMax1').value), bMin: parseInt(document.getElementById('addMin2').value), bMax: parseInt(document.getElementById('addMax2').value) }, mul: { aMin: parseInt(document.getElementById('mulMin1').value), aMax: parseInt(document.getElementById('mulMax1').value), bMin: parseInt(document.getElementById('mulMin2').value), bMax: parseInt(document.getElementById('mulMax2').value) } };
                    if(document.getElementById('addCheck').checked) state.config.ops.push('add');
                    if(document.getElementById('subCheck').checked) state.config.ops.push('sub');
                    if(document.getElementById('mulCheck').checked) state.config.ops.push('mul');
                    if(document.getElementById('divCheck').checked) state.config.ops.push('div');
                    if(state.config.ops.length === 0) return alert("Select at least one operation.");
                }
            }
            state.score = { correct: 0, wrong: 0 }; state.mistakes = []; state.isPaused = false; state.mode = 'active';
            state.sequenceIndex = (state.gameType === 'tables' || state.gameType === 'squares') ? state.config.min : 1; 
            state.timer = state.config.mode === 'order' ? 0 : state.timeLimit;
            generateQuestion(); render(); startTimer();
            setTimeout(() => { const input = document.getElementById('answerInput'); if(input) input.focus(); }, 100);
        }

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function generateQuestion() {
            if (state.gameType === 'tables') {
                let multiplier = state.config.mode === 'order' ? state.sequenceIndex : getRandomInt(state.config.min, state.config.max);
                state.currentQ = { text: `${state.config.num} × ${multiplier}`, answer: state.config.num * multiplier };
            } 
            else if (state.gameType === 'squares') {
                let num = state.config.mode === 'order' ? state.sequenceIndex : getRandomInt(state.config.min, state.config.max);
                let symbol = state.config.type === 'square' ? '²' : '³';
                state.currentQ = { text: `${num}${symbol}`, answer: state.config.type === 'square' ? num*num : num*num*num };
            } 
            else if (state.gameType === 'drill') {
                let op = state.config.ops[Math.floor(Math.random() * state.config.ops.length)];
                if (op === 'add' || op === 'sub') {
                    let a = getRandomInt(state.config.add.aMin, state.config.add.aMax), b = getRandomInt(state.config.add.bMin, state.config.add.bMax);
                    if (op === 'add') state.currentQ = { text: `${a} + ${b}`, answer: a + b };
                    if (op === 'sub') state.currentQ = { text: `${a + b} - ${a}`, answer: b };
                } else if (op === 'mul' || op === 'div') {
                    let a = getRandomInt(state.config.mul.aMin, state.config.mul.aMax), b = getRandomInt(state.config.mul.bMin, state.config.mul.bMax);
                    if (op === 'mul') state.currentQ = { text: `${a} × ${b}`, answer: a * b };
                    if (op === 'div') { if (a===0) a=1; state.currentQ = { text: `${a * b} ÷ ${a}`, answer: b }; }
                }
            }
        }

        function startTimer() {
            clearInterval(state.interval);
            state.interval = setInterval(() => {
                if(state.mode !== 'active') { clearInterval(state.interval); return; }
                let limit = (state.gameType === 'tables' || state.gameType === 'squares') ? state.config.max : 50;
                if(state.config.mode !== 'order') {
                    state.timer--;
                    let pct = (state.timer / state.timeLimit) * 100;
                    document.getElementById('timeDisplay').innerText = `${state.timer}s remaining`;
                    document.getElementById('timeBar').style.width = `${pct}%`;
                    if (state.timer <= 0) endGame();
                } else {
                    state.timer++; 
                    let progress = (state.gameType === 'tables' || state.gameType === 'squares') ? (state.sequenceIndex - state.config.min + 1) : state.sequenceIndex;
                    let totalSteps = (state.gameType === 'tables' || state.gameType === 'squares') ? (state.config.max - state.config.min + 1) : limit;
                    document.getElementById('timeDisplay').innerText = `Time: ${state.timer}s`;
                    document.getElementById('timeBar').style.width = `${(progress / totalSteps) * 100}%`;
                }
            }, 1000);
        }

        function handleInput(e) {
            if (e.key === 'Enter' && !state.isPaused) {
                let inputEl = document.getElementById('answerInput'), userAns = parseInt(inputEl.value);
                if(isNaN(userAns)) return;
                if (userAns === state.currentQ.answer) {
                    state.score.correct++; progressGame();
                } else {
                    state.score.wrong++; state.mistakes.push({ q: state.currentQ.text, yours: userAns, correct: state.currentQ.answer });
                    state.isPaused = true;
                    inputEl.classList.remove('focus:border-indigo-500', 'focus:ring-indigo-100', 'dark:focus:border-indigo-400');
                    inputEl.classList.add('bg-red-50', 'dark:bg-red-900/30', 'border-red-500', 'text-red-600', 'dark:text-red-400', 'focus:ring-red-100');
                    document.getElementById('feedback').innerHTML = `<span class="bg-red-100 dark:bg-red-900/80 text-red-700 dark:text-red-100 px-4 py-1 rounded-full text-sm shadow-sm font-semibold fade-in">Correct: <span class="font-black">${state.currentQ.answer}</span></span>`;
                    setTimeout(() => {
                        inputEl.classList.remove('bg-red-50', 'dark:bg-red-900/30', 'border-red-500', 'text-red-600', 'dark:text-red-400', 'focus:ring-red-100');
                        inputEl.classList.add('focus:border-indigo-500', 'focus:ring-indigo-100', 'dark:focus:border-indigo-400');
                        document.getElementById('feedback').innerHTML = ''; state.isPaused = false; progressGame();
                    }, 1400); 
                }
            }
        }

        function progressGame() {
            let limit = (state.gameType === 'tables' || state.gameType === 'squares') ? state.config.max : 50;
            if (state.config.mode === 'order' && state.sequenceIndex >= limit) endGame();
            else {
                if(state.config.mode === 'order') state.sequenceIndex++;
                generateQuestion();
                document.getElementById('qText').innerText = state.currentQ.text;
                document.getElementById('answerInput').value = '';
                document.getElementById('answerInput').focus();
                document.getElementById('scoreCorrect').innerText = state.score.correct;
                document.getElementById('scoreWrong').innerText = state.score.wrong;
            }
        }

        function endGame() {
            clearInterval(state.interval); updateDailyStreak();
            let elapsedTime = state.config.mode === 'order' ? state.timer : (state.timeLimit - state.timer);
            state.pbData = calculatePB(elapsedTime);
            state.mode = 'results'; render();
        }

        function renderActiveGame() {
            app.innerHTML = `
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 dark:border-slate-800 pb-4">
                    <div class="flex flex-col w-1/3 min-w-[100px]">
                        <span id="timeDisplay" class="text-xs font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-wide mb-1">${state.config.mode === 'order' ? 'Time: 0s' : state.timeLimit + 's remaining'}</span>
                        <div class="w-full bg-gray-200 dark:bg-slate-700 rounded-full h-2 overflow-hidden shadow-inner">
                            <div id="timeBar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-2 rounded-full transition-all duration-1000 ease-linear" style="width: ${state.config.mode === 'order' ? '0%' : '100%'}"></div>
                        </div>
                    </div>
                    <button onclick="endGame()" class="text-[10px] font-bold text-gray-500 hover:text-gray-800 bg-gray-100 dark:bg-slate-800 px-3 py-2 rounded-lg">End Early</button>
                    <div class="flex gap-2 font-bold bg-white dark:bg-slate-900 px-3 py-2 rounded-xl border border-gray-200 dark:border-slate-700">
                        <span class="text-emerald-500">✅ <span id="scoreCorrect">0</span></span>
                        <span class="text-gray-300">|</span>
                        <span class="text-rose-500">❌ <span id="scoreWrong">0</span></span>
                    </div>
                </div>
                
                <div class="flex-grow flex flex-col items-center justify-center py-4 relative">
                    <div id="feedback" class="h-8 absolute top-0"></div>
                    <div class="flex items-center gap-4 mb-6 mt-8">
                        <div id="qText" class="text-[4rem] font-black text-transparent bg-clip-text bg-gradient-to-br from-gray-800 to-gray-600 dark:from-slate-100 dark:to-slate-400 text-center">${state.currentQ.text}</div>
                        <div class="text-[3rem] font-bold text-gray-300 hidden md:block">=</div>
                    </div>
                    <input type="number" inputmode="numeric" pattern="[0-9]*" id="answerInput" onkeydown="handleInput(event)" 
                        class="w-48 text-center text-[2.5rem] font-bold text-gray-900 dark:text-slate-100 border-4 border-white dark:border-slate-800 rounded-2xl py-3 focus:border-indigo-400 outline-none transition-all bg-white/90 dark:bg-slate-900/90" 
                        autocomplete="off" placeholder="?">
                </div>
            `;
        }

        function renderResults() {
            let total = state.score.correct + state.score.wrong, acc = total === 0 ? 0 : Math.round((state.score.correct / total) * 100);
            let pbHTML = '';
            if (state.pbData && state.pbData.best !== null) {
                pbHTML = state.pbData.isNew 
                    ? `<div class="inline-block mt-3 bg-gradient-to-r from-amber-400 to-orange-500 text-white text-xs font-bold px-3 py-1 rounded-full animate-bounce">🏆 New Personal Best!</div>`
                    : `<div class="mt-2 text-xs font-semibold text-gray-500">Personal Best: <span class="text-indigo-500">${state.pbData.isTimeBased ? state.pbData.best+'s' : state.pbData.best+' pts'}</span></div>`;
            }

            let html = `
                <div class="text-center mb-8 relative"><h2 class="text-3xl font-extrabold text-gray-900 dark:text-slate-100 mb-2">Session Complete!</h2>${pbHTML}</div>
                <div class="grid grid-cols-3 gap-3 mb-8">
                    <div class="bg-white dark:bg-slate-900 border border-emerald-100 p-4 rounded-2xl text-center"><p class="text-emerald-600 text-[10px] font-bold uppercase mb-1">Correct</p><p class="text-3xl font-black text-emerald-600">${state.score.correct}</p></div>
                    <div class="bg-white dark:bg-slate-900 border border-rose-100 p-4 rounded-2xl text-center"><p class="text-rose-600 text-[10px] font-bold uppercase mb-1">Mistakes</p><p class="text-3xl font-black text-rose-600">${state.score.wrong}</p></div>
                    <div class="bg-white dark:bg-slate-900 border border-indigo-100 p-4 rounded-2xl text-center"><p class="text-indigo-600 text-[10px] font-bold uppercase mb-1">Accuracy</p><p class="text-3xl font-black text-indigo-600">${acc}%</p></div>
                </div>
            `;

            if (state.mistakes.length > 0) {
                html += `
                    <div class="bg-white dark:bg-slate-900 border border-gray-200 rounded-2xl overflow-hidden mb-8 flex-grow flex flex-col">
                        <div class="bg-gray-50 px-4 py-3 border-b"><h3 class="font-bold text-gray-700 text-sm">Mistakes</h3></div>
                        <div class="max-h-56 overflow-y-auto"><table class="w-full text-left"><tbody class="divide-y divide-gray-50">
                            ${state.mistakes.map(m => `<tr><td class="px-4 py-3 font-bold text-gray-700">${m.q}</td><td class="px-4 py-3 text-rose-400 line-through">${m.yours}</td><td class="px-4 py-3 text-emerald-500 font-black">${m.correct}</td></tr>`).join('')}
                        </tbody></table></div></div>
                `;
            }

            html += `
                <div class="flex flex-col md:flex-row gap-3 mt-auto">
                    <button onclick="startGame()" class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-xl">Play Again</button>
                    <button onclick="goMenu()" class="flex-1 bg-white dark:bg-slate-800 border-2 border-gray-200 text-gray-700 dark:text-slate-200 font-bold py-4 rounded-xl">Main Menu</button>
                </div>
            `;
            app.innerHTML = html;
        }

        function goMenu() { state.mode = 'menu'; render(); }
        render();
    </script>
</body>
</html>
